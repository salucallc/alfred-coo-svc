name: Fleet E2E
on:
  push:
    branches: [ main, feature/* ]
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run E2E tests
        run: |
          pytest -vv tests/fleet/e2e --junitxml=reports/fleet_e2e.xml
