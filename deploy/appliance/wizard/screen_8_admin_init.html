<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wizard Screen 8 – Admin Init</title>
  <style>
    body {font-family: Arial, sans-serif; margin: 2rem;}
    .container {max-width: 600px; margin: auto;}
    label {display: block; margin-top: 1rem;}
    input {width: 100%; padding: .5rem;}
    button {margin-top: 1rem; padding: .5rem 1rem;}
  </style>
</head>
<body>
  <div class="container">
    <h1>Administrator Passphrase</h1>
    <p>Set the appliance-admin passphrase to secure the admin account.</p>
    <form id="adminForm" action="/api/v1/admin/init" method="POST">
      <label for="passphrase">Passphrase:</label>
      <input type="password" id="passphrase" name="passphrase" required />
      <button type="submit">Initialize Admin</button>
    </form>
    <div id="result"></div>
  </div>
  <script>
    const form = document.getElementById('adminForm');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const pass = document.getElementById('passphrase').value;
      const resp = await fetch('/api/v1/admin/init', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({passphrase: pass})
      });
      const out = document.getElementById('result');
      if (resp.ok) { out.textContent = 'Admin initialized successfully.'; }
      else { out.textContent = 'Error initializing admin.'; }
    });
  </script>
</body>
</html>
