# Infisical agent sidecar configuration
# This sidecar fetches secrets from Infisical and writes them to /run/secrets
# Services should mount this volume to access secrets.

x-infisical-agent: &infisical-agent
  image: infisical/infisical-agent:latest
  environment:
    - INFISICAL_TOKEN=${INFISICAL_TOKEN}
  volumes:
    - /run/secrets:/run/secrets
