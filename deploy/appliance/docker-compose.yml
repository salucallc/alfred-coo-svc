# deploy/appliance/docker-compose.yml
# Mission Control Appliance bundle -- SAL-2557
# Single `docker compose up` stands up all services behind Caddy reverse proxy.
# Paired with deploy/appliance/Caddyfile (SAL-2558, PR #11).
#
# Required environment:
#   APPLIANCE_HOSTNAME   (default: localhost; set to real FQDN for HTTPS via ACME)
#   POSTGRES_PASSWORD    (required; no default)
#   SOUL_API_KEY_ROOT    (required; root bootstrap key for soul-svc)
#   OLLAMA_BASE_URL      (default: http://host.docker.internal:11434)

version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APPLIANCE_HOSTNAME: ${APPLIANCE_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - alfred-portal
      - soul-svc
      - mcp-gateway
      - open-webui
    networks:
      - appliance

  alfred-portal:
    image: ghcr.io/salucallc/alfred-portal:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://appliance:${POSTGRES_PASSWORD:?must set}@postgres:5432/alfred
      SOUL_API_URL: http://soul-svc:8080
      MCP_GATEWAY_URL: http://mcp-gateway:8000
    depends_on:
      postgres:
        condition: service_healthy
      soul-svc:
        condition: service_started
    networks:
      - appliance

  soul-svc:
    image: ghcr.io/salucallc/soul-svc:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://appliance:${POSTGRES_PASSWORD:?must set}@postgres:5432/soul
      SOUL_API_KEY_ROOT: ${SOUL_API_KEY_ROOT:?must set}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - soul_data:/var/lib/soul-svc
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - appliance

  mcp-gateway:
    image: ghcr.io/salucallc/mcp-gateway:latest
    restart: unless-stopped
    environment:
      SOUL_API_URL: http://soul-svc:8080
    depends_on:
      soul-svc:
        condition: service_healthy
    networks:
      - appliance

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    environment:
      WEBUI_URL: http://${APPLIANCE_HOSTNAME:-localhost}/chat
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ENABLE_SIGNUP: "false"
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - appliance

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: appliance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must set}
      POSTGRES_DB: appliance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appliance"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - appliance

volumes:
  caddy_data:
  caddy_config:
  soul_data:
  postgres_data:
  open_webui_data:

networks:
  appliance:
    driver: bridge