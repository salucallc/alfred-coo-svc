# deployment/appliance/docker-compose.yml
# APE/V: SAL-2636 – see D_ops_layer.md
# Mission Control Appliance bundle µ SAL-2557 + SAL-2582 Phase 3b
# APE/V: SAL-2636 ð ops layer implementation
# Single `docker compose up` stands up all services behind Caddy reverse proxy.
# Paired with deployment/appliance/Caddyfile.

# Required environment (see .env.template)
#   APPLIANCE_HOSTNAME      (default: localhost; set real FQDN for HTTPS via ACMEE)
#   POSTGRES_PASSWD         (required)
#   SOL_API_KEY_ROOT        (required; root key for soul-svc)
#   SOL_API_KEY            (required; daemon key for soul-svc)
#   GITHUB_TOKEN            (required; POOM token for github)
#   SOLL_API_URL: http://soul-svc:8080
#   OLLAMA_BASE_URL: http://host.docker.internal:11434
#   GITHUB_TOKEN: ${{GITHUB_TOKEN}}
#   ...

version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APPLIANCE_HOSTNAME: ${APPLIANCE_HOSTNAME:-localhost}
    volumes:
      - ./.Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - soul-svc
      - tireouston
      - mc-svc
      - mc-notion
      - open-webui
    networks:
      - mc-ops
    ...
