# deploy/appliance/docker-compose.yml
# Mission Control Appliance bundle — SAL-2557 + SAL-2582 Phase 3b
# APE/V: SAL-2636 – ops layer implementation
# Single `docker compose up` stands up all services behind Caddy reverse proxy.
# Paired with deploy/appliance/Caddyfile.

# Required environment (see .env.template):
#   APPLIANCE_HOSTNAME   (default: localhost; set real FQDN for HTTPS via ACME)
#   POSTGRES_PASSWORD    (required)
#   SOUL_API_KEY_ROOT    (required; root bootstrap key for soul-svc)
#   SOUL_API_KEY         (required; daemon key — mint after first-boot wizard)
#   GITHUB_TOKEN         (required; PAT for COO daemon + mcp-github)
#   SLACK_BOT_TOKEN      (required; xoxb token for COO daemon + mcp-slack)
#   SLACK_TEAM_ID        (required; Slack workspace ID starting with T)
#   LINEAR_API_KEY       (required; for COO daemon + mcp-linear)
#   NOTION_API_KEY       (required; for mcp-notion)
#   OLLAMA_BASE_URL      (default: http://host.docker.internal:11434)

version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APPLIANCE_HOSTNAME: ${APPLIANCE_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - alfred-portal
      - soul-svc
      - alfred-coo-svc
      - mcp-github
      - mcp-slack
      - mcp-linear
      - mcp-notion
      - open-webui
    networks:
      - appliance

  alfred-portal:
    image: ghcr.io/salucallc/alfred-portal:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://appliance:${POSTGRES_PASSWORD:?must set}@postgres:5432/alfred
      SOUL_API_URL: http://soul-svc:8080
    depends_on:
      postgres:
        condition: service_healthy
      soul-svc:
        condition: service_started
    networks:
      - appliance

  soul-svc:
    image: ghcr.io/salucallc/soul-svc:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://appliance:${POSTGRES_PASSWORD:?must set}@postgres:5432/soul
      SOUL_API_KEY_ROOT: ${SOUL_API_KEY_ROOT:?must set}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - soul_data:/var/lib/soul-svc
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8080/v1/healthz\", timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - appliance

  alfred-coo-svc:
    image: ghcr.io/salucallc/alfred-coo-svc:latest
    restart: unless-stopped
    environment:
      SOUL_API_URL: http://soul-svc:8080
      SOUL_API_KEY: ${SOUL_API_KEY:?must set}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GITHUB_TOKEN: ${GITHUB_TOKEN:?must set}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:?must set}
      LINEAR_API_KEY: ${LINEAR_API_KEY:?must set}
    depends_on:
      soul-svc:
        condition: service_healthy
    networks:
      - mc-egress
      - appliance

  # — MCP Services (curated: github, slack, linear, notion) ————
  mcp-github:
    image: ghcr.io/salucallc/mcp-gateway-node:latest
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN:?must set}
    command: ["--port", "8203", "--outputTransport", "streamableHttp", "--healthEndpoint", "/healthz", "--stdio", "npx -y @modelcontextprotocol/server-github"]
    networks:
      - mc-internal

  mcp-slack:
    image: ghcr.io/salucallc/mcp-gateway-node:latest
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:?must set}
      SLACK_TEAM_ID: ${SLACK_TEAM_ID:?must set}
    command: ["--port", "8201", "--outputTransport", "streamableHttp", "--healthEndpoint", "/healthz", "--stdio", "npx -y @modelcontextprotocol/server-slack"]
    networks:
      - mc-internal

  mcp-linear:
    image: ghcr.io/salucallc/mcp-gateway-node:latest
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      LINEAR_API_KEY: ${LINEAR_API_KEY:?must set}
    command: ["--port", "8208", "--outputTransport", "streamableHttp", "--healthEndpoint", "/healthz", "--stdio", "npx -y linear-mcp-server"]
    networks:
      - mc-internal

  mcp-notion:
    image: ghcr.io/salucallc/mcp-gateway-node:latest
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    environment:
      NOTION_API_KEY: ${NOTION_API_KEY:?must set}
    command: ["--port", "8212", "--outputTransport", "streamableHttp", "--healthEndpoint", "/healthz", "--stdio", "npx -y @notionhq/notion-mcp-server"]
    networks:
      - mc-internal

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    environment:
      WEBUI_URL: http://${APPLIANCE_HOSTNAME:-localhost}/chat
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      ENABLE_SIGNUP: "false"
    volumes:
      - open_webui_data:/app/backend/data
    networks:
      - appliance

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: appliance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must set}
      POSTGRES_DB: appliance
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appliance"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - appliance

  # New aletheia service
  aletheia-svc:
    image: ghcr.io/salucallc/aletheia-svc:latest
    restart: unless-stopped
    environment:
      SOUL_API_URL: http://soul-svc:8080
    depends_on:
      soul-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - appliance

  # — end services

volumes:
  caddy_data:
  caddy_config:
  soul_data:
  postgres_data:
  open_webui_data:
  grafana_data:
  prometheus_data:
  loki_data:
  restic_data:

networks:
  appliance:
    driver: bridge
  mc-ops:
    driver: bridge
  mc-internal:
    driver: bridge
  mc-egress:
    driver: bridge
