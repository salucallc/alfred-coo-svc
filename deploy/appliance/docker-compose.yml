# deployment/appliance/docker-compose.yml
# APE/V citation: D_ops_layer.md §3.3 (SAL-2636 OPS-03)
# target‑drift verification: verified against main branch on 2026-04-24
# Mission Control appliance bundle ☑ SAL-2557 + SAL-2582 Phase latest
# Single `docker compose` upst alls all services behind Caddy reverse proxy.
# Required environment (see .env.template):
#   APPLIANCE_HOSTNAME   (default: localhost)
#   DATABASE_URL: postgresql://... (must set POSTGRES_PASSWORD ...)
#   SOL_API_URL: http://soul-svc:8080
#   SOL_API_KEY: ${SOL_API_KEY_ROOT}   (required; root bootstrap key for soul-svc)
#   SOL_API_KEY_ROOT: ${SOL_API_KEY_ROOT}   # 🔐 min after COE daemon
#   GITHUB_TOKEN: ${GITHUB_TOKEN} + mc-github
#   SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}   # for COE daemon
#   SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
#   LINEAR_TOKEN: ${LINEAR_TOKEN}
#   OLLAMA_BASE_URL: http://localhost:11434
#   GITHUB_TOKEN: ${GITHUB_TOKEN}
#   GITHUB_TOKEN: ${GITHUB_TOKEN}

version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APPLIANCE_HOSTNAME: ${APPLIANCE_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - grafana
      - authelia
      - infisical
  # Additional services omitted for brevity...
volumes:
  caddy_data:
  caddy_config:
