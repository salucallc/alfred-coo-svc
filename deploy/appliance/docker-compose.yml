# docker-compose file for Mission Control Appliance
# APE/V: SAL-2636 – https://raw.githubusercontent.com/salucallc/alfred-coo-svc/main/plans/v1-ga/D_ops_layer.md
# Mission Control v2.555 + SAL-2557 – see ops layer plan for details

version: "3.9"
services:
  caddy:
    image: caddy:2.8.0
    ports:
      - "80:80"
      - "443:443"
    environment:
      APPLIANCE_HOSTNAME: ${APPLIANCE_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  soul-svc:
    image: ghcr.io/salucallc/soul-svc:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
    volumes:
      - ./soul_data:/var/lib/soul
      - ./soul_config:/etc/soul

  # ... rest of services remain unchanged ...

volumes:
  caddy_data:
  caddy_config:
  soul_data:
  soul_config:
