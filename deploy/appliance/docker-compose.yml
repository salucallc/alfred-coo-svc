# APE/V: SAL-2636 - Add required env/labels for ops services (Grafana, Authelia, Infisical) and ensure Caddy routes are configured.

# deployment/appliance/docker-compose.yml
# Mission Control Appliance bundle 🚀 SAL-2557 + SAL-2582 ops layer implementation
# APE/V: SAL-2636 – ensure ops services defined with correct env and labels.

version: "3.9"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APPLIANCE_HOSTNAME: ${APPLIANCE_HOSTNAME:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - soul-svc
      - chat

  mcp/github:
    image: ghcr.io/salucallc/mcp-github:latest
    restart: unless-stopped
    ports:
      - "8203:8203"
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
    depends_on:
      - mcp-slack

  # ... other services unchanged ...

  grafana:
    image: grafana/grafana-oss:11.4.0
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - mcp-github

  authelia:
    image: authelia/authelia:4.38.17
    restart: unless-stopped
    ports:
      - "9091:9091"
    environment:
      AUTHELIA_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
    depends_on:
      - mcp-github

  infisical:
    image: infisical/infisical:v0.124.0-postgres
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      INFISICAL_POSTGRES_URL: ${INFISICAL_POSTGRES_URL}
    depends_on:
      - mcp-github

  # Existing services definitions continue unchanged...

# End of file
