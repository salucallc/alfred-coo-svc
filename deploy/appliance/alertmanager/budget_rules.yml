groups:
  - name: budget_alerts
    rules:
      - alert: TenantDailyBudgetExceeded
        expr: sum by (tenant_id) (mc_cost_usd_total) > 10
        for: 2m
        annotations:
          summary: "Tenant {{ $labels.tenant_id }} exceeded daily budget of $10"
          description: "Cost total ${{ $value }} exceeds $10 daily budget."
      - alert: PersonaMonthlyBudgetExceeded
        expr: sum by (tenant_id, persona_id) (mc_cost_usd_total) > 50
        for: 2m
        annotations:
          summary: "Persona {{ $labels.persona_id }} of tenant {{ $labels.tenant_id }} exceeded monthly budget of $50"
          description: "Cost total ${{ $value }} exceeds $50 monthly budget."
