# Authelia configuration with file backend fallback
# This config enables a simple file-based user backend for air-gapped environments.

!configuration

authentication_backend:
  file:
    path: /config/users_database.yml
    password_algorithm: argon2id
    password_reset:
      disable: true

access_control:
  default_policy: deny
  rules:
    - domain: "*"
      policy: one_factor

session:
  name: authelia_session
  secret: "{{ env.AUTHELIA_SESSION_SECRET | default \"change-me\" }}"
  expiration: 1h
  inactivity: 5m
  remember_me_duration: 1M

# Additional required sections (simplified)

default_redirection_url: "https://{{ env.AUTHELIA_DEFAULT_HOST | default \"localhost\" }}/"

server:
  host: 0.0.0.0
  port: 9091

tls:
  # In production, provide proper certificates
  certificate: /etc/authelia/certs/cert.pem
  private_key: /etc/authelia/certs/key.pem

log:
  level: info
  format: text
