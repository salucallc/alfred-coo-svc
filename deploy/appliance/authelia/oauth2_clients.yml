# OAuth2 client configuration for scoped API tokens
clients:
  - client_id: ops-14-scoped
    client_secret: <generated-secret>
    grant_types:
      - client_credentials
    scopes:
      - soul:memory:read
      - soul:memory:write
      - tiresias:audit:read
      - tiresias:cost:read
      - mcp:tools:invoke
      - vault:read/write
    token_ttl: 24h
    rotation:
      enabled: true
      ui: portal
