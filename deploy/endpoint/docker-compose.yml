version: '3.8'

services:
  alfred-coo-svc:
    image: salucallc/alfred-coo-svc:latest
    container_name: alfred-coo-svc-endpoint
    env_file:
      - ./.env.template
    command: ["sh", "-c", "COO_MODE=endpoint python -m alfred_coo_svc"]
    networks:
      - endpoint-net
    ports: []

  soul-lite:
    image: salucallc/soul-lite:latest
    container_name: soul-lite-endpoint
    volumes:
      - ./data:/data
    environment:
      - SQLITE_DB=/data/soul-lite.db
    networks:
      - endpoint-net

networks:
  endpoint-net:
    driver: bridge
