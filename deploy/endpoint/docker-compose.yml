version: "3.8"
services:
  alfred-coo-svc:
    image: salucallc/alfred-coo-svc:latest
    environment:
      - COO_MODE=endpoint
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "8080:8080"
  soul-lite:
    image: salucallc/soul-lite:latest
    volumes:
      - soul-lite-data:/data
    restart: unless-stopped
volumes:
  soul-lite-data:
