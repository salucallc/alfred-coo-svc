; PlatformIO project for the Alfred voice puck (Seeed XIAO ESP32-S3 + ReSpeaker XVF3800).
;
; Default environment uses arduino-esp32 framework for fast iteration.
; A pure ESP-IDF environment is provided as `[env:idf]` for the eventual
; migration once esp-adf integration is required (see README.md, "Framework").
;
; Hardware contract:
;   * MCU      : Seeed XIAO ESP32-S3 (ESP32-S3R8, 8 MB flash, 8 MB Octal PSRAM)
;   * I2C bus  : SDA = GPIO5, SCL = GPIO6 (Seeed reference pinout)
;   * I2C peers: 0x18 TLV320AIC3104 codec, 0x2C XVF3800 control servicer
;   * USB      : native USB-CDC console (XIAO built-in Type-C, NOT the XMOS port)

[platformio]
default_envs = arduino
description  = Alfred voice puck firmware (XIAO ESP32-S3 + XVF3800)

; ---------------------------------------------------------------------------
; Common settings shared across environments.
; ---------------------------------------------------------------------------
[common]
platform        = espressif32@~6.7.0
board           = seeed_xiao_esp32s3
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time
; XIAO ESP32-S3 uses native USB-Serial/JTAG (no CP210x). Raising the upload
; baud past the default fails with "No serial data received" right after the
; baud renegotiation step inside esptool. 115200 is rock solid; flash takes
; about 25 s for a ~290 KB sketch which is acceptable for the bench loop.
upload_speed    = 115200
; Use the partition table that gives a 3 MB application slot. Future Phase 1
; tickets add libopus, WebSocket client, and I2S buffers, all of which push us
; past the default 1.5 MB OTA partition.
board_build.partitions = partitions/huge_app.csv
; Force 8 MB Octal PSRAM enabled. The XIAO ESP32-S3 ships in two SKUs; the
; one on the bench is the R8 (Octal). Without this the chip boots without
; PSRAM and heap exhaustion bites at first Opus buffer.
board_build.arduino.memory_type = qio_opi
board_upload.flash_size         = 8MB
board_upload.maximum_size       = 8388608

; ---------------------------------------------------------------------------
; Default: arduino-esp32 framework (chosen for Phase 1 development speed).
; arduino-esp32 sits on top of ESP-IDF, so APIs we depend on (i2s_std,
; esp_log, esp_psram) remain reachable when we later flip to pure IDF.
; ---------------------------------------------------------------------------
[env:arduino]
extends   = common
framework = arduino
; ---------------------------------------------------------------------------
; Library dependencies.
;
; sh123/esp32_opus pulls in the upstream xiph Opus 1.x codec sources
; pre-configured with FIXED_POINT and OPUS_BUILD, which is the right build
; for ESP32-S3 (no float build, see plan ticket 5 / SAL-4001 constraint).
; The wrapper LICENSE says GPL-3 but every source file under its `src/` is
; upstream BSD-3 (verified on inspection); if license review later demands
; full ownership of the source tree, swap to vendoring opus-1.4 under
; firmware/alfred_voice_puck/lib/opus/.
; ---------------------------------------------------------------------------
lib_deps =
  sh123/esp32_opus@^1.0.3
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D CORE_DEBUG_LEVEL=3
  -D BOARD_HAS_PSRAM
  -D ALFRED_FW_VERSION=\"0.1.1-opus\"
build_unflags =
; XIAO ESP32-S3 uses native USB-Serial/JTAG, not a USB-UART bridge, so esptool
; must enter the bootloader via USB reset rather than RTS/DTR. Without this
; flag a `pio run -t upload` while firmware is running fails with
; "No serial data received" after the baud renegotiation.
upload_flags =
  --before
  usb_reset
  --after
  hard_reset

; ---------------------------------------------------------------------------
; Future ESP-IDF environment. Not exercised in Phase 1 but kept here so the
; migration is a single `--environment idf` flip rather than a rewrite.
; ---------------------------------------------------------------------------
[env:idf]
extends   = common
framework = espidf
build_flags =
  -D ALFRED_FW_VERSION=\"0.1.0-skeleton\"
